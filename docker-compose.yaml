services:
  forum-web:
    image: lehaiau/forum-react-web:v1
    build:
      context: .
      args:
        - VITE_APP_API_URL=http://localhost:8080/api/v1
    container_name: forum-react-web
    ports:
      - "3000:80"
    restart: unless-stopped
    networks:
      - forum-network

networks:
  forum-network:
    name: forum-network
    driver: bridge